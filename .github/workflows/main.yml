name: Build UxPlay Debian Package

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config libssl-dev libplist-dev \
            libavahi-compat-libdnssd-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Inject CPack Configuration
        run: |
          # Append CPack logic to the end of CMakeLists.txt
          cat <<EOF >> CMakeLists.txt

          # CPack configuration
          set(CPACK_GENERATOR "DEB")
          set(CPACK_PACKAGE_NAME "uxplay")
          set(CPACK_PACKAGE_VERSION "1.71")
          set(CPACK_PACKAGE_CONTACT "https://github.com/FDH2/UxPlay")
          set(CPACK_DEBIAN_PACKAGE_DEPENDS "libssl3, libplist3, libavahi-client3, libgstreamer1.0-0, gstreamer1.0-plugins-base, gstreamer1.0-plugins-good, gstreamer1.0-libav")
          set(CPACK_DEBIAN_PACKAGE_DESCRIPTION "AirPlay Unix mirroring server")
          include(CPack)
          EOF

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          make -j$(nproc)

      - name: Package
        run: |
          cd build
          # Now that include(CPack) was in CMakeLists, this will work
          cpack -G DEB

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uxplay-deb
          path: build/*.deb
